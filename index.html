<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahaweli Authority Member Search</title>
    <style>
        /* --- COVER PAGE WITH MAHAWELI BACKGROUND --- */
        #coverPage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* High-quality background image representing Mahaweli water resources */
            background: linear-gradient(rgba(0, 48, 120, 0.7), rgba(0, 48, 120, 0.7)), 
                        url('https://images.unsplash.com/photo-1580193330910-38604771488b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            text-align: center;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        #coverPage h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #coverPage h2 { 
            color: #ffd700; /* Gold color for sub-text */
            font-size: 1.5rem; 
            margin-top: 5px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .start-btn {
            padding: 18px 50px;
            font-size: 18px;
            background: #ffd700;
            color: #003078;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }
        .start-btn:hover { 
            transform: scale(1.1); 
            background: #ffffff;
            box-shadow: 0 6px 25px rgba(0,0,0,0.5);
        }

        /* --- ORIGINAL STYLES --- */
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .main-title { color: #1a73e8; text-align: center; margin-bottom: 30px; }

        .search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .search-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: bold; color: #5f6368; margin-bottom: 8px; }
        input { padding: 12px; border: 2px solid #dfe1e5; border-radius: 8px; outline: none; transition: 0.3s; font-size: 15px; }
        input:focus { border-color: #1a73e8; }

        #resultsWrapper { display: none; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: #f8f9fa; padding: 12px; border-bottom: 2px solid #dee2e6; color: #3c4043; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .name-cell { font-weight: bold; color: #1a73e8; }

        #noResult { display: none; text-align: center; color: #d93025; font-weight: 500; }

        .print-btn {
            display: none;
            margin-top: 20px;
            padding: 12px;
            background-color: #28a745; /* Green for success/print */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
        }

        /* --- PRINT LOGIC --- */
        @media print {
            #coverPage, .search-grid, .print-btn, .main-title { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; }
            #resultsWrapper { display: block !important; margin-top: 0; }
            table { border: 1px solid #ccc; }
            th { background-color: #eee !important; color: black !important; }
        }
    </style>
</head>
<body>

<div id="coverPage">
    <h1>MAHAWELI AUTHORITY</h1>
    <h2>Member Information & Society Database</h2>
    <button class="start-btn" onclick="enterSite()">Enter System</button>
</div>

<div class="container">
    <h2 class="main-title">Member Search System</h2>

    <div class="search-grid">
        <div class="search-group">
            <label>Search by Society Name</label>
            <input type="text" id="societyInput" onkeyup="searchBySociety()" placeholder="e.g. Gamunu">
        </div>

        <div class="search-group">
            <label>Search by ID Number</label>
            <input type="text" id="idInput" onkeyup="searchByID()" placeholder="e.g. 99312...">
        </div>
    </div>

    <div id="resultsWrapper">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Society</th>
                    <th>ID Number</th>
                    <th>Phone</th>
                </tr>
            </thead>
            <tbody id="listBody"></tbody>
        </table>
        <button class="print-btn" id="printBtn" onclick="window.print()">Print Official Report</button>
    </div>
    
    <p id="noResult">No matching records found.</p>
</div>

<script>
    function enterSite() {
        const cover = document.getElementById('coverPage');
        cover.style.opacity = '0';
        setTimeout(() => {
            cover.style.visibility = 'hidden';
        }, 600);
    }

    const database = [
        { name: "Supun", society: "gamunu", phone: "713071005", id: "993120723v" },
        { name: "Jayasooriya", society: "gamunu", phone: "N/A", id: "982356753v" },
        { name: "Pradeep", society: "udawalawa", phone: "N/A", id: "199901107" }
	
    ];

    function displayResults(matches) {
        const wrapper = document.getElementById('resultsWrapper');
        const listBody = document.getElementById('listBody');
        const noResult = document.getElementById('noResult');
        const printBtn = document.getElementById('printBtn');

        listBody.innerHTML = "";

        if (matches.length > 0) {
            wrapper.style.display = "block";
            noResult.style.display = "none";
            printBtn.style.display = "block";
            matches.forEach(p => {
                listBody.innerHTML += `<tr>
                    <td class="name-cell">${p.name}</td>
                    <td>${p.society}</td>
                    <td>${p.id}</td>
                    <td>${p.phone}</td>
                </tr>`;
            });
        } else {
            wrapper.style.display = "none";
            noResult.style.display = "block";
            printBtn.style.display = "none";
        }
    }

    function searchBySociety() {
        document.getElementById('idInput').value = ""; 
        const query = document.getElementById('societyInput').value.toLowerCase();
        if (query === "") { hideAll(); return; }
        const matches = database.filter(person => person.society.toLowerCase().includes(query));
        displayResults(matches);
    }

    function searchByID() {
        document.getElementById('societyInput').value = ""; 
        const query = document.getElementById('idInput').value.toLowerCase();
        if (query === "") { hideAll(); return; }
        const matches = database.filter(person => person.id.toLowerCase().includes(query));
        displayResults(matches);
    }

    function hideAll() {
        document.getElementById('resultsWrapper').style.display = "none";
        document.getElementById('noResult').style.display = "none";
        document.getElementById('printBtn').style.display = "none";
    }
</script>

</body>
</html>
